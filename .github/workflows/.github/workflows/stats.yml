name: update-top-langs

on:
  schedule:
    - cron: "0 3 * * *"   # once a day
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: 'username=${{ github.repository_owner }}&layout=compact&theme=default&hide_border=true&langs_count=8'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/top-langs.svg
          git commit -m "chore: update top languages card" || echo "No changes to commit"
          git push
